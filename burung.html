<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Floppy Bird</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Baloo+2:wght@400;600;800&display=swap" rel="stylesheet">
<style>
:root {
  --sky1: #74d7f7;
  --sky2: #b8eaff;
  --pipe: #5cb85c;
  --pipe-dark: #3a7a3a;
  --accent: #ff6b35;
  --yellow: #ffd93d;
  --ground: #c8a96e;
  --ground-top: #7ec850;
  --white: #fff;
  --dark: #1a1a2e;
  --card: rgba(255,255,255,0.15);
  --pixel: 'Press Start 2P', monospace;
  --body-font: 'Baloo 2', cursive;
}

* { margin:0; padding:0; box-sizing:border-box; }

html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  font-family: var(--body-font);
  background: #0d1b2a;
}

/* ══════════════════════════════
   PAGE SYSTEM
══════════════════════════════ */
.page {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: opacity 0.5s, transform 0.5s;
}
.page.hidden {
  opacity: 0;
  pointer-events: none;
  transform: scale(0.96);
}

/* ══════════════════════════════
   HOME PAGE
══════════════════════════════ */
#home-page {
  flex-direction: column;
  background: linear-gradient(160deg, #0d1b2a 0%, #1a2e4a 50%, #0d2a1e 100%);
  overflow-y: auto;
}

.home-bg {
  position: absolute;
  inset: 0;
  overflow: hidden;
  pointer-events: none;
}

.star {
  position: absolute;
  border-radius: 50%;
  background: #fff;
  animation: twinkle var(--d, 3s) ease-in-out infinite;
}
@keyframes twinkle {
  0%,100%{ opacity:0.2; transform:scale(1); }
  50%{ opacity:1; transform:scale(1.4); }
}

.home-content {
  position: relative;
  z-index: 2;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 28px;
  padding: 40px 20px;
  width: 100%;
  max-width: 480px;
}

/* Logo / title */
.logo-wrap {
  text-align: center;
  position: relative;
}

.logo-bird {
  font-size: 70px;
  animation: logoBob 1.8s ease-in-out infinite;
  display: block;
  filter: drop-shadow(0 8px 20px rgba(255,107,53,0.5));
}
@keyframes logoBob {
  0%,100%{ transform: translateY(0) rotate(-5deg); }
  50%{ transform: translateY(-14px) rotate(5deg); }
}

.logo-title {
  font-family: var(--pixel);
  font-size: clamp(18px, 5vw, 26px);
  color: var(--yellow);
  text-shadow: 3px 3px 0 #c8880a, 6px 6px 0 rgba(255,107,53,0.4);
  letter-spacing: 2px;
  margin-top: 10px;
}

.logo-sub {
  font-size: 13px;
  color: rgba(255,255,255,0.5);
  margin-top: 6px;
  letter-spacing: 3px;
  text-transform: uppercase;
}

/* Upload card */
.upload-card {
  background: rgba(255,255,255,0.07);
  border: 2px solid rgba(255,255,255,0.15);
  border-radius: 24px;
  padding: 28px 32px;
  width: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 18px;
  backdrop-filter: blur(12px);
  box-shadow: 0 8px 32px rgba(0,0,0,0.3);
}

.card-title {
  font-family: var(--pixel);
  font-size: 9px;
  color: rgba(255,255,255,0.6);
  letter-spacing: 2px;
  text-transform: uppercase;
}

.bird-avatar-wrap {
  position: relative;
}

.bird-avatar {
  width: 110px;
  height: 110px;
  border-radius: 50%;
  border: 4px solid var(--accent);
  background: rgba(255,255,255,0.08);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 52px;
  overflow: hidden;
  cursor: pointer;
  transition: transform 0.2s, box-shadow 0.2s;
  box-shadow: 0 0 0 6px rgba(255,107,53,0.2), 0 8px 30px rgba(255,107,53,0.3);
  animation: avatarPulse 2.5s ease-in-out infinite;
}
@keyframes avatarPulse {
  0%,100%{ box-shadow: 0 0 0 6px rgba(255,107,53,0.2), 0 8px 30px rgba(255,107,53,0.3); }
  50%{ box-shadow: 0 0 0 12px rgba(255,107,53,0.1), 0 8px 30px rgba(255,107,53,0.5); }
}
.bird-avatar:hover { transform: scale(1.06); }
.bird-avatar img { width:100%; height:100%; object-fit:cover; border-radius:50%; }

.avatar-edit-badge {
  position: absolute;
  bottom: 4px; right: 4px;
  width: 28px; height: 28px;
  background: var(--accent);
  border-radius: 50%;
  border: 2px solid #fff;
  display: flex; align-items: center; justify-content: center;
  font-size: 13px;
  cursor: pointer;
  box-shadow: 0 2px 8px rgba(0,0,0,0.4);
}

.avatar-hint {
  font-size: 12px;
  color: rgba(255,255,255,0.45);
}

#file-input { display: none; }

/* Stats row */
.stats-row {
  display: flex;
  gap: 14px;
  width: 100%;
}
.stat-box {
  flex: 1;
  background: rgba(0,0,0,0.25);
  border-radius: 14px;
  padding: 12px 10px;
  text-align: center;
  border: 1px solid rgba(255,255,255,0.08);
}
.stat-label {
  font-size: 9px;
  color: rgba(255,255,255,0.4);
  letter-spacing: 2px;
  text-transform: uppercase;
  font-family: var(--pixel);
}
.stat-val {
  font-family: var(--pixel);
  font-size: 20px;
  color: var(--yellow);
  margin-top: 4px;
}
#home-best { color: #ffd93d; }
#home-played { color: #74d7f7; }

/* Buttons */
.btn-play {
  width: 100%;
  padding: 16px;
  border: none;
  border-radius: 16px;
  font-family: var(--pixel);
  font-size: 14px;
  letter-spacing: 2px;
  cursor: pointer;
  background: linear-gradient(135deg, #ff6b35, #ff3366);
  color: #fff;
  box-shadow: 0 6px 0 #c0202a, 0 12px 30px rgba(255,107,53,0.35);
  transition: all 0.12s;
  position: relative;
  overflow: hidden;
}
.btn-play::before {
  content: '';
  position: absolute;
  top: 0; left: -100%;
  width: 60%; height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
  animation: btnShine 2.5s infinite;
}
@keyframes btnShine {
  0%{ left:-100%; }
  60%,100%{ left:150%; }
}
.btn-play:active { transform: translateY(4px); box-shadow: 0 2px 0 #c0202a; }

.music-toggle {
  display: flex;
  align-items: center;
  gap: 10px;
  background: rgba(255,255,255,0.07);
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 50px;
  padding: 8px 18px;
  cursor: pointer;
  transition: background 0.2s;
  color: rgba(255,255,255,0.7);
  font-size: 13px;
}
.music-toggle:hover { background: rgba(255,255,255,0.12); }
.music-icon { font-size: 20px; }
.toggle-track {
  width: 36px; height: 20px;
  background: rgba(255,255,255,0.2);
  border-radius: 10px;
  position: relative;
  transition: background 0.3s;
}
.toggle-track.on { background: #5cb85c; }
.toggle-thumb {
  position: absolute;
  width: 14px; height: 14px;
  background: #fff;
  border-radius: 50%;
  top: 3px; left: 3px;
  transition: left 0.3s;
  box-shadow: 0 1px 4px rgba(0,0,0,0.3);
}
.toggle-track.on .toggle-thumb { left: 19px; }

.btn-reset {
  font-family: var(--pixel);
  font-size: 8px;
  color: rgba(255,255,255,0.3);
  background: none;
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 8px;
  padding: 7px 14px;
  cursor: pointer;
  letter-spacing: 1px;
  transition: all 0.2s;
}
.btn-reset:hover { color: #ff6b6b; border-color: #ff6b6b; }

/* Music upload section */
.music-section {
  width: 100%;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 16px;
  padding: 16px 20px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.music-section-title {
  font-family: var(--pixel);
  font-size: 8px;
  color: rgba(255,255,255,0.5);
  letter-spacing: 2px;
  text-transform: uppercase;
}

.music-row {
  display: flex;
  align-items: center;
  gap: 12px;
}

.music-upload-btn {
  flex-shrink: 0;
  font-family: var(--pixel);
  font-size: 8px;
  padding: 9px 14px;
  background: linear-gradient(135deg, #6c3483, #9b59b6);
  color: #e8daef;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  box-shadow: 0 3px 0 #4a235a;
  transition: all 0.1s;
  letter-spacing: 1px;
  white-space: nowrap;
}
.music-upload-btn:active { transform: translateY(2px); box-shadow: 0 1px 0 #4a235a; }
.music-upload-btn:hover { background: linear-gradient(135deg, #8e44ad, #bb8fce); }

.music-name {
  flex: 1;
  font-size: 11px;
  color: rgba(255,255,255,0.55);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.music-name.loaded { color: #a9dfbf; }

.music-del-btn {
  flex-shrink: 0;
  background: none;
  border: 1px solid rgba(255,100,100,0.3);
  color: rgba(255,100,100,0.6);
  border-radius: 8px;
  font-size: 14px;
  width: 28px; height: 28px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.2s;
}
.music-del-btn:hover { background: rgba(255,100,100,0.15); color: #ff6b6b; border-color: #ff6b6b; }
.music-del-btn.hidden { opacity: 0; pointer-events: none; }

#music-file-input { display: none; }

/* ══════════════════════════════
   GAME PAGE
══════════════════════════════ */
#game-page {
  flex-direction: column;
  align-items: center;
  justify-content: center;
  background: #0d1b2a;
}

.game-topbar {
  position: absolute;
  top: 0; left: 0; right: 0;
  padding: 12px 20px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  z-index: 10;
  background: linear-gradient(to bottom, rgba(0,0,0,0.5), transparent);
}

.topbar-score {
  font-family: var(--pixel);
  font-size: 13px;
  color: #fff;
  text-shadow: 0 2px 8px rgba(0,0,0,0.5);
}

.btn-home {
  font-family: var(--pixel);
  font-size: 9px;
  color: rgba(255,255,255,0.8);
  background: rgba(0,0,0,0.4);
  border: 1px solid rgba(255,255,255,0.2);
  border-radius: 10px;
  padding: 7px 12px;
  cursor: pointer;
  backdrop-filter: blur(6px);
}
.btn-home:hover { background: rgba(255,107,53,0.5); }

.canvas-outer {
  position: relative;
  border-radius: 20px;
  overflow: hidden;
  box-shadow:
    0 0 0 4px rgba(255,255,255,0.9),
    0 0 0 8px var(--accent),
    0 20px 60px rgba(0,0,0,0.7);
}

canvas#gc {
  display: block;
  cursor: pointer;
}

/* ══════════════════════════════
   SCORE POPUP
══════════════════════════════ */
.score-popup {
  position: absolute;
  font-family: var(--pixel);
  font-size: 13px;
  color: var(--yellow);
  text-shadow: 0 0 10px var(--yellow), 0 2px 0 #c8880a;
  pointer-events: none;
  animation: popUp 0.8s forwards;
  z-index: 20;
}
@keyframes popUp {
  0%{ opacity:1; transform: translateY(0) scale(1.3); }
  100%{ opacity:0; transform: translateY(-50px) scale(0.8); }
}

</style>
</head>
<body>

<!-- ══ HOME PAGE ══ -->
<div class="page" id="home-page">
  <div class="home-bg" id="star-bg"></div>
  <div class="home-content">
    <div class="logo-wrap">
      <span class="logo-bird" id="home-bird-emoji">🐦</span>
      <div class="logo-title">FLOPPY BIRD</div>
      <div class="logo-sub">Tap · Fly · Survive</div>
    </div>

    <div class="upload-card">
      <div class="card-title">✦ Karakter Burungmu ✦</div>
      <div class="bird-avatar-wrap">
        <div class="bird-avatar" id="bird-avatar" onclick="document.getElementById('file-input').click()">
          <span id="avatar-emoji">🐦</span>
        </div>
        <div class="avatar-edit-badge" onclick="document.getElementById('file-input').click()">✏️</div>
      </div>
      <input type="file" id="file-input" accept="image/*">
      <div class="avatar-hint">Klik avatar untuk upload gambar burung</div>

      <div class="stats-row">
        <div class="stat-box">
          <div class="stat-label">Best Score</div>
          <div class="stat-val" id="home-best">0</div>
        </div>
        <div class="stat-box">
          <div class="stat-label">Dimainkan</div>
          <div class="stat-val" id="home-played">0</div>
        </div>
      </div>
    </div>

    <button class="btn-play" id="btn-play">▶ &nbsp; MAIN SEKARANG</button>

    <div class="music-toggle" id="music-toggle">
      <span class="music-icon">🎵</span>
      <span>Musik</span>
      <div class="toggle-track on" id="toggle-track">
        <div class="toggle-thumb"></div>
      </div>
    </div>

    <!-- Music upload -->
    <div class="music-section">
      <div class="music-section-title">🎶 Backsound</div>
      <div class="music-row">
        <button class="music-upload-btn" onclick="document.getElementById('music-file-input').click()">📂 Upload Musik</button>
        <span class="music-name" id="music-name-label">Belum ada musik</span>
        <button class="music-del-btn hidden" id="music-del-btn" title="Hapus musik">✕</button>
      </div>
      <input type="file" id="music-file-input" accept="audio/*">
    </div>

    <button class="btn-reset" id="btn-reset">🗑 Reset Data</button>
  </div>
</div>

<!-- ══ GAME PAGE ══ -->
<div class="page hidden" id="game-page">
  <div class="game-topbar">
    <button class="btn-home" id="btn-home">← Beranda</button>
    <div class="topbar-score">
      <span id="score-label">SKOR: </span><span id="topbar-score-val">0</span>
    </div>
  </div>
  <div class="canvas-outer" id="canvas-outer">
    <canvas id="gc"></canvas>
  </div>
</div>

<script>
// ════════════════════════════════════════════════
// AUDIO ENGINE — MP3 upload + Web Audio SFX
// ════════════════════════════════════════════════
let audioCtx = null;
let musicOn = true;
let bgAudio = null;   // HTMLAudioElement for background music
let bgObjectURL = null;

function getAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

function startMusic() {
  if (!musicOn || !bgAudio) return;
  try {
    bgAudio.currentTime = 0;
    bgAudio.volume = 0.4;
    bgAudio.loop = true;
    const p = bgAudio.play();
    if (p) p.catch(() => {});
  } catch(e) {}
}

function stopMusic() {
  if (bgAudio) { bgAudio.pause(); bgAudio.currentTime = 0; }
}

function pauseMusic() {
  if (bgAudio) bgAudio.pause();
}

function resumeMusic() {
  if (!musicOn || !bgAudio) return;
  const p = bgAudio.play();
  if (p) p.catch(() => {});
}

function loadMusicFromDataURL(dataURL) {
  if (bgObjectURL) { URL.revokeObjectURL(bgObjectURL); bgObjectURL = null; }
  if (bgAudio) { bgAudio.pause(); bgAudio = null; }
  bgAudio = new Audio(dataURL);
  bgAudio.loop = true;
  bgAudio.volume = 0.4;
}

// ── SFX ──
function sfxFlap() {
  try {
    const ac = getAudioCtx();
    const osc = ac.createOscillator();
    const g = ac.createGain();
    osc.connect(g); g.connect(ac.destination);
    osc.type = 'sine';
    osc.frequency.setValueAtTime(400, ac.currentTime);
    osc.frequency.exponentialRampToValueAtTime(200, ac.currentTime + 0.1);
    g.gain.setValueAtTime(0.35, ac.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.12);
    osc.start(); osc.stop(ac.currentTime + 0.13);
  } catch(e){}
}

function sfxScore() {
  try {
    const ac = getAudioCtx();
    const freqs = [523.25, 659.25, 783.99, 1046.5];
    freqs.forEach((f, i) => {
      const osc = ac.createOscillator();
      const g = ac.createGain();
      osc.connect(g); g.connect(ac.destination);
      osc.type = 'square';
      osc.frequency.value = f;
      const t = ac.currentTime + i * 0.07;
      g.gain.setValueAtTime(0.001, t);
      g.gain.exponentialRampToValueAtTime(0.3, t + 0.01);
      g.gain.exponentialRampToValueAtTime(0.001, t + 0.1);
      osc.start(t); osc.stop(t + 0.12);
    });
  } catch(e){}
}

function sfxDie() {
  try {
    const ac = getAudioCtx();
    const bufSize = ac.sampleRate * 0.4;
    const buf = ac.createBuffer(1, bufSize, ac.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < bufSize; i++) data[i] = (Math.random() * 2 - 1) * (1 - i / bufSize);
    const src = ac.createBufferSource();
    src.buffer = buf;
    const g = ac.createGain();
    const lp = ac.createBiquadFilter();
    lp.type = 'lowpass'; lp.frequency.value = 600;
    src.connect(lp); lp.connect(g); g.connect(ac.destination);
    g.gain.value = 0.5;
    src.start();

    const osc = ac.createOscillator();
    const og = ac.createGain();
    osc.type = 'sawtooth';
    osc.frequency.setValueAtTime(300, ac.currentTime);
    osc.frequency.exponentialRampToValueAtTime(60, ac.currentTime + 0.5);
    og.gain.setValueAtTime(0.4, ac.currentTime);
    og.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.5);
    osc.connect(og); og.connect(ac.destination);
    osc.start(); osc.stop(ac.currentTime + 0.5);
  } catch(e){}
}

// ════════════════════════════════════════════════
// STORAGE
// ════════════════════════════════════════════════
const SKEY = 'floppybird2_v1';
let store = { best: 0, played: 0, birdImg: null, music: true, musicData: null, musicName: null };

function loadStore() {
  try {
    const raw = localStorage.getItem(SKEY);
    if (raw) {
      const d = JSON.parse(raw);
      store.best = d.best || 0;
      store.played = d.played || 0;
      store.birdImg = d.birdImg || null;
      store.music = d.music !== undefined ? d.music : true;
      store.musicData = d.musicData || null;
      store.musicName = d.musicName || null;
    }
  } catch(e) {}
}

function saveStore() {
  try { localStorage.setItem(SKEY, JSON.stringify(store)); } catch(e) {}
}

// ════════════════════════════════════════════════
// HOME PAGE LOGIC
// ════════════════════════════════════════════════
let birdImgObj = null;

function updateMusicUI() {
  const label = document.getElementById('music-name-label');
  const delBtn = document.getElementById('music-del-btn');
  if (store.musicName) {
    label.textContent = '♪ ' + store.musicName;
    label.className = 'music-name loaded';
    delBtn.classList.remove('hidden');
  } else {
    label.textContent = 'Belum ada musik';
    label.className = 'music-name';
    delBtn.classList.add('hidden');
  }
}

function updateHomeUI() {
  document.getElementById('home-best').textContent = store.best;
  document.getElementById('home-played').textContent = store.played;
  musicOn = store.music;
  const track = document.getElementById('toggle-track');
  if (musicOn) track.classList.add('on'); else track.classList.remove('on');

  if (store.birdImg) {
    document.getElementById('bird-avatar').innerHTML = `<img src="${store.birdImg}" alt="bird">`;
    const logoB = document.getElementById('home-bird-emoji');
    logoB.style.fontSize = '70px';
    logoB.innerHTML = `<img src="${store.birdImg}" style="width:70px;height:70px;border-radius:50%;object-fit:cover;">`;
  }
  updateMusicUI();
}

// Generate stars
function buildStars() {
  const bg = document.getElementById('star-bg');
  for (let i = 0; i < 80; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    const sz = Math.random() * 2.5 + 1;
    s.style.cssText = `
      width:${sz}px; height:${sz}px;
      top:${Math.random()*100}%;
      left:${Math.random()*100}%;
      --d:${(Math.random()*3+2).toFixed(1)}s;
      animation-delay:${(Math.random()*4).toFixed(1)}s;
    `;
    bg.appendChild(s);
  }
}

document.getElementById('file-input').addEventListener('change', function(e) {
  const file = e.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    const dataURL = ev.target.result;
    const img = new Image();
    img.onload = () => {
      birdImgObj = img;
      store.birdImg = dataURL;
      saveStore();
      updateHomeUI();
    };
    img.src = dataURL;
  };
  reader.readAsDataURL(file);
});

document.getElementById('music-toggle').addEventListener('click', () => {
  musicOn = !musicOn;
  store.music = musicOn;
  saveStore();
  const track = document.getElementById('toggle-track');
  if (musicOn) { track.classList.add('on'); resumeMusic(); }
  else { track.classList.remove('on'); pauseMusic(); }
});

// Upload musik
document.getElementById('music-file-input').addEventListener('change', function(e) {
  const file = e.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = function(ev) {
    const dataURL = ev.target.result;
    loadMusicFromDataURL(dataURL);
    store.musicName = file.name;
    try {
      store.musicData = dataURL;
      saveStore();
    } catch(err) {
      // Too big for localStorage, keep only in memory
      store.musicData = null;
      store.musicName = file.name + ' ⚠ (terlalu besar, tidak disimpan)';
    }
    updateMusicUI();
  };
  reader.readAsDataURL(file);
  e.target.value = '';
});

// Hapus musik
document.getElementById('music-del-btn').addEventListener('click', function() {
  stopMusic(); bgAudio = null;
  store.musicData = null; store.musicName = null;
  saveStore(); updateMusicUI();

document.getElementById('btn-reset').addEventListener('click', () => {

document.getElementById('btn-play').addEventListener('click', () => {

document.getElementById('btn-home').addEventListener('click', () => {

  goHome();
});

function goHome() {
  document.getElementById('home-page').classList.remove('hidden');
  document.getElementById('game-page').classList.add('hidden');
  updateHomeUI();
  if (musicOn) startMusic(); else stopMusic();
}

function goGame() {
  document.getElementById('home-page').classList.add('hidden');
  document.getElementById('game-page').classList.remove('hidden');
  stopMusic();
  initGame();
  if (!gameLoopRunning) { gameLoopRunning = true; requestAnimationFrame(gameLoop); }
}

// ════════════════════════════════════════════════
// GAME ENGINE
// ════════════════════════════════════════════════
const canvas = document.getElementById('gc');
const ctx = canvas.getContext('2d');

// Responsive size
function setCanvasSize() {
  const maxW = Math.min(window.innerWidth - 20, 380);
  const maxH = Math.min(window.innerHeight - 100, 560);
  const ratio = 380 / 560;
  let W, H;
  if (maxW / maxH > ratio) { H = maxH; W = Math.round(H * ratio); }
  else { W = maxW; H = Math.round(W / ratio); }
  canvas.width = W; canvas.height = H;
}
setCanvasSize();

let CW = () => canvas.width, CH = () => canvas.height;

const GRAVITY = 0.38;
const FLAP_V = -7.0;
const PIPE_W = 52;
const PIPE_GAP = 148;
const PIPE_SPEED = 2.5;
const GRD_H = 65;

let gameState = 'idle'; // idle | playing | dead
let gameRunning = false;
let gameLoopRunning = false;
let bird, pipes, score, frame, particles;
let groundOff = 0, deathTimer = 0;
let clouds = [];

// ── Cloud init ──
function initClouds() {
  clouds = [];
  for (let i = 0; i < 4; i++) {
    clouds.push({
      x: Math.random() * CW(),
      y: 30 + Math.random() * 120,
      w: 60 + Math.random() * 60,
      s: 0.25 + Math.random() * 0.35
    });
  }
}

function initGame() {
  const W = CW(), H = CH();
  bird = { x: W * 0.22, y: H * 0.42, vy: 0, angle: 0, phase: 0 };
  pipes = []; particles = [];
  score = 0; frame = 0; deathTimer = 0;
  gameState = 'idle'; gameRunning = true;
  initClouds();
  document.getElementById('topbar-score-val').textContent = '0';
}

// ── Input ──
canvas.addEventListener('click', doFlap);
canvas.addEventListener('touchstart', e => { e.preventDefault(); doFlap(); }, {passive:false});
document.addEventListener('keydown', e => { if (e.code === 'Space') { e.preventDefault(); doFlap(); } });

function doFlap() {
  if (!gameRunning) return;
  if (gameState === 'idle') {
    gameState = 'playing';
    bird.vy = FLAP_V;
    sfxFlap();
    if (musicOn) startMusic();
  } else if (gameState === 'playing') {
    bird.vy = FLAP_V;
    sfxFlap();
    spawnParticles(bird.x, bird.y, 'rgba(255,255,255,0.8)', 5);
  } else if (gameState === 'dead' && deathTimer > 45) {
    store.played++;
    saveStore();
    initGame();
  }
}

// ── Particles ──
function spawnParticles(x, y, color, n) {
  for (let i = 0; i < n; i++) {
    const a = Math.random() * Math.PI * 2;
    const sp = Math.random() * 3.5 + 1;
    particles.push({ x, y, vx: Math.cos(a)*sp, vy: Math.sin(a)*sp - 2, life: 1, color, sz: Math.random()*4+2 });
  }
}

// ── Spawn pipe ──
function spawnPipe() {
  const H = CH(), sky = H - GRD_H;
  const minT = 50, maxT = sky - PIPE_GAP - 50;
  const topH = minT + Math.random() * (maxT - minT);
  pipes.push({ x: CW() + 10, topH, scored: false });
}

// ── Collision ──
function hitTest() {
  const W = CW(), H = CH(), sky = H - GRD_H;
  const bx = bird.x, by = bird.y, br = 14;
  if (by + br >= sky || by - br <= 0) return true;
  for (const p of pipes) {
    if (bx + br > p.x - 5 && bx - br < p.x + PIPE_W + 5) {
      if (by - br < p.topH || by + br > p.topH + PIPE_GAP) return true;
    }
  }
  return false;
}

// ── Draw helpers ──
function drawBg() {
  const W = CW(), H = CH(), sky = H - GRD_H;
  // Sky
  const sg = ctx.createLinearGradient(0,0,0,sky);
  sg.addColorStop(0,'#5ec8f0'); sg.addColorStop(1,'#c4ecff');
  ctx.fillStyle = sg; ctx.fillRect(0,0,W,sky);

  // Clouds
  clouds.forEach(c => {
    ctx.save();
    ctx.fillStyle = 'rgba(255,255,255,0.88)';
    ctx.shadowColor = 'rgba(255,255,255,0.5)'; ctx.shadowBlur = 10;
    const r = c.w * 0.18, cx2 = c.x + c.w/2;
    ctx.beginPath();
    ctx.arc(cx2,     c.y,          r*1.2, 0, Math.PI*2);
    ctx.arc(cx2-c.w*.22, c.y+r*.4, r*.9,  0, Math.PI*2);
    ctx.arc(cx2+c.w*.22, c.y+r*.4, r*.9,  0, Math.PI*2);
    ctx.arc(cx2-c.w*.38, c.y+r*.8, r*.65, 0, Math.PI*2);
    ctx.arc(cx2+c.w*.38, c.y+r*.8, r*.65, 0, Math.PI*2);
    ctx.fill(); ctx.restore();
  });

  // Ground green strip
  ctx.fillStyle = '#6aba2f';
  ctx.fillRect(0, sky, W, 14);
  ctx.fillStyle = '#4f9a1e';
  ctx.fillRect(0, sky+14, W, 4);

  // Ground body
  const gg = ctx.createLinearGradient(0,sky+18,0,H);
  gg.addColorStop(0,'#d4a843'); gg.addColorStop(1,'#a07828');
  ctx.fillStyle = gg;
  ctx.fillRect(0, sky+18, W, GRD_H-18);

  // Ground scroll lines
  ctx.strokeStyle = 'rgba(0,0,0,0.1)'; ctx.lineWidth = 2;
  for (let i = 0; i < 8; i++) {
    const lx = ((groundOff + i*55) % (W+55)) - 55;
    ctx.beginPath(); ctx.moveTo(lx,sky+6); ctx.lineTo(lx+35,sky+6); ctx.stroke();
  }
}

function drawPipe(p) {
  const H = CH(), sky = H - GRD_H;
  const botY = p.topH + PIPE_GAP, botH = sky - botY;
  function rPipe(px, py, pw, ph, capAtBottom) {
    const g = ctx.createLinearGradient(px,0,px+pw,0);
    g.addColorStop(0,'#3fa31a'); g.addColorStop(0.28,'#6dc236');
    g.addColorStop(0.65,'#50b020'); g.addColorStop(1,'#287010');
    ctx.fillStyle = g; ctx.fillRect(px,py,pw,ph);
    ctx.fillStyle='rgba(255,255,255,0.18)'; ctx.fillRect(px+7,py+2,10,ph-4);
    const cw=pw+14,ch=22,cx=px-7;
    const cy = capAtBottom ? py+ph-ch : py;
    const cg = ctx.createLinearGradient(cx,0,cx+cw,0);
    cg.addColorStop(0,'#2e8a14'); cg.addColorStop(0.28,'#5cb02c');
    cg.addColorStop(0.65,'#449c18'); cg.addColorStop(1,'#1e6008');
    ctx.fillStyle=cg; ctx.fillRect(cx,cy,cw,ch);
    ctx.fillStyle='rgba(255,255,255,0.16)'; ctx.fillRect(cx+7,cy+4,12,ch-8);
    ctx.strokeStyle='rgba(0,0,0,0.18)'; ctx.lineWidth=1.5;
    ctx.strokeRect(px,py,pw,ph); ctx.strokeRect(cx,cy,cw,ch);
  }
  if (p.topH > 0) rPipe(p.x, 0, PIPE_W, p.topH, true);
  if (botH > 0)   rPipe(p.x, botY, PIPE_W, botH, false);
}

function drawBird() {
  const bx = bird.x, by = bird.y;
  const ang = Math.max(-0.5, Math.min(Math.PI/2, bird.angle));
  ctx.save();
  ctx.translate(bx, by);
  ctx.rotate(ang);
  const R = 17;

  if (birdImgObj) {
    ctx.save();
    ctx.beginPath(); ctx.arc(0,0,R,0,Math.PI*2); ctx.clip();
    ctx.drawImage(birdImgObj,-R,-R,R*2,R*2);
    ctx.restore();
    ctx.strokeStyle='rgba(255,255,255,0.8)'; ctx.lineWidth=2.5;
    ctx.beginPath(); ctx.arc(0,0,R,0,Math.PI*2); ctx.stroke();
    // glow
    ctx.shadowColor='rgba(255,200,50,0.6)'; ctx.shadowBlur=12;
    ctx.beginPath(); ctx.arc(0,0,R,0,Math.PI*2); ctx.stroke();
  } else {
    // default chick
    const wy = Math.sin(bird.phase)*6;
    const bg = ctx.createRadialGradient(-4,-4,2,0,0,R);
    bg.addColorStop(0,'#fff4a0'); bg.addColorStop(0.6,'#ffcc00'); bg.addColorStop(1,'#e08800');
    ctx.fillStyle=bg;
    ctx.beginPath(); ctx.arc(0,0,R,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#ffdd44';
    ctx.beginPath(); ctx.ellipse(-5,wy-3,12,5,-0.3,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#fff';
    ctx.beginPath(); ctx.arc(7,-5,7,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#1a1a2e';
    ctx.beginPath(); ctx.arc(9,-4,3.5,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#fff';
    ctx.beginPath(); ctx.arc(10.5,-5.5,1.4,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#ff7700';
    ctx.beginPath(); ctx.moveTo(13,-1); ctx.lineTo(21,2); ctx.lineTo(13,5); ctx.closePath(); ctx.fill();
  }
  ctx.restore();

  // ground shadow
  const sky = CH() - GRD_H;
  ctx.save(); ctx.globalAlpha=0.13;
  ctx.fillStyle='#000';
  ctx.beginPath(); ctx.ellipse(bx, sky-3, R, 5, 0, 0, Math.PI*2); ctx.fill();
  ctx.restore();
}

function drawParticles() {
  particles.forEach(p => {
    ctx.save();
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.shadowColor = p.color; ctx.shadowBlur = 8;
    ctx.beginPath(); ctx.arc(p.x, p.y, p.sz, 0, Math.PI*2); ctx.fill();
    ctx.restore();
  });
}

function drawIdleOverlay() {
  const W = CW(), H = CH();
  ctx.save();
  ctx.fillStyle='rgba(0,0,0,0.38)'; ctx.fillRect(0,0,W,H);
  ctx.textAlign='center';
  ctx.font=`bold 12px 'Press Start 2P'`;
  ctx.fillStyle='#fff';
  ctx.shadowColor='rgba(0,0,0,0.6)'; ctx.shadowBlur=10;
  ctx.fillText('TAP UNTUK MULAI', W/2, H/2-8);
  ctx.font=`10px 'Baloo 2'`;
  ctx.fillStyle='rgba(255,255,255,0.6)'; ctx.shadowBlur=0;
  ctx.fillText('Spasi / Klik / Tap', W/2, H/2+18);
  ctx.restore();
}

function drawDeadOverlay() {
  if (deathTimer < 12) return;
  const alpha = Math.min(1,(deathTimer-12)/25);
  const W = CW(), H = CH(), cx = W/2, cy = H/2;
  ctx.save(); ctx.globalAlpha = alpha;
  ctx.fillStyle='rgba(0,0,0,0.5)'; ctx.fillRect(0,0,W,H);

  // Card
  const cw2=Math.min(260,W-40), ch2=180;
  const cx2=cx-cw2/2, cy2=cy-ch2/2;
  ctx.shadowColor='rgba(0,0,0,0.5)'; ctx.shadowBlur=24;
  ctx.fillStyle='#fff';
  rRect(cx2,cy2,cw2,ch2,18); ctx.fill();
  ctx.shadowBlur=0;

  ctx.font=`bold 13px 'Press Start 2P'`;
  ctx.fillStyle='#e74c3c'; ctx.textAlign='center';
  ctx.fillText('GAME OVER', cx, cy2+40);

  ctx.font=`10px 'Press Start 2P'`;
  ctx.fillStyle='#555';
  ctx.fillText(`Skor: ${score}`, cx, cy2+72);
  ctx.fillStyle='#e08800';
  ctx.fillText(`Best: ${store.best}`, cx, cy2+98);

  if (score > 0 && score >= store.best) {
    ctx.font=`8px 'Press Start 2P'`;
    ctx.fillStyle='#e74c3c';
    ctx.fillText('✦ REKOR BARU! ✦', cx, cy2+122);
  }

  if (deathTimer > 45) {
    ctx.font=`8px 'Press Start 2P'`;
    ctx.fillStyle='#aaa';
    ctx.fillText('Tap untuk main lagi', cx, cy2+152);
  }
  ctx.restore();
}

function drawLiveScore() {
  if (gameState !== 'playing') return;
  const W = CW();
  ctx.save();
  ctx.font=`bold 26px 'Press Start 2P'`;
  ctx.textAlign='center';
  ctx.strokeStyle='rgba(0,0,0,0.3)'; ctx.lineWidth=4;
  ctx.strokeText(score, W/2, 50);
  ctx.fillStyle='#fff'; ctx.shadowColor='rgba(0,0,0,0.4)'; ctx.shadowBlur=8;
  ctx.fillText(score, W/2, 50);
  ctx.restore();
}

function rRect(x,y,w,h,r) {
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.arcTo(x+w,y,x+w,y+h,r);
  ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r);
  ctx.arcTo(x,y,x+w,y,r);
  ctx.closePath();
}

// ── Score popups ──
let scorePopups = [];
function spawnScorePopup() {
  const el = document.createElement('div');
  el.className = 'score-popup';
  el.textContent = '+1';
  const outer = document.getElementById('canvas-outer');
  const rect = canvas.getBoundingClientRect();
  const outerRect = outer.getBoundingClientRect();
  el.style.left = (rect.left - outerRect.left + bird.x - 10) + 'px';
  el.style.top  = (rect.top  - outerRect.top  + bird.y - 24) + 'px';
  outer.appendChild(el);
  setTimeout(() => el.remove(), 900);
}

// ── MAIN GAME LOOP ──
function gameLoop() {
  if (!gameLoopRunning) return;

  const W = CW(), H = CH(), sky = H - GRD_H;

  if (gameState === 'playing') {
    frame++;
    groundOff = (groundOff + PIPE_SPEED) % (W + 55);
    clouds.forEach(c => { c.x -= c.s; if (c.x + c.w < 0) c.x = W + 20; });

    bird.vy += GRAVITY;
    bird.y  += bird.vy;
    bird.angle = bird.vy * 0.065;
    bird.phase += 0.22;

    if (frame % 88 === 0) spawnPipe();
    pipes.forEach(p => p.x -= PIPE_SPEED);
    pipes = pipes.filter(p => p.x + PIPE_W > -20);

    pipes.forEach(p => {
      if (!p.scored && p.x + PIPE_W < bird.x - 14) {
        p.scored = true; score++;
        if (score > store.best) store.best = score;
        saveStore();
        sfxScore();
        spawnParticles(bird.x, bird.y, '#ffd700', 10);
        spawnScorePopup();
        document.getElementById('topbar-score-val').textContent = score;
        document.getElementById('home-best').textContent = store.best;
      }
    });

    particles = particles.filter(p=>p.life>0);
    particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=0.14;p.life-=0.04;p.sz*=0.97;});

    if (hitTest()) {
      gameState = 'dead';
      sfxDie();
      stopMusic();
      spawnParticles(bird.x, bird.y, '#ff4040', 22);
      saveStore();
    }

  } else if (gameState === 'idle') {
    groundOff = (groundOff + PIPE_SPEED * 0.5) % (W+55);
    clouds.forEach(c => { c.x -= c.s*0.5; if (c.x+c.w<0) c.x=W+20; });
    bird.y = H * 0.42 + Math.sin(Date.now()/520) * 12;
    bird.angle = 0; bird.phase = (bird.phase||0)+0.12;
    particles = particles.filter(p=>p.life>0);
    particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=0.14;p.life-=0.04;p.sz*=0.97;});

  } else if (gameState === 'dead') {
    deathTimer++;
    bird.vy += GRAVITY * 0.4;
    bird.y  = Math.min(sky - 16, bird.y + bird.vy);
    bird.angle = Math.min(Math.PI/2, bird.angle + 0.05);
    particles = particles.filter(p=>p.life>0);
    particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=0.14;p.life-=0.04;p.sz*=0.97;});
  }

  // Draw
  ctx.clearRect(0,0,W,H);
  drawBg();
  pipes.forEach(drawPipe);
  drawParticles();
  drawBird();
  drawLiveScore();
  if (gameState === 'idle') drawIdleOverlay();
  if (gameState === 'dead') drawDeadOverlay();

  requestAnimationFrame(gameLoop);
}
